<div class="flex h-screen overflow-hidden bg-gray-100 font-sans">
  <aside class="flex h-full w-64 shrink-0 flex-col bg-[#1e293b] text-white shadow-2xl">
    <div class="flex h-20 items-center justify-center border-b border-slate-700 p-6 text-center">
      <span class="font-black text-xl uppercase italic tracking-widest text-blue-400">Traffic Signs</span>
    </div>

    <nav class="flex-1 space-y-2 overflow-y-auto px-4 pt-6">

      <ng-container *ngIf="isAdmin || !isAdmin">
        <a routerLink="/map" routerLinkActive="bg-blue-600 shadow-lg"
           class="group flex items-center rounded-xl p-3 transition-all hover:bg-slate-700">
          <span class="mr-3 text-lg transition-transform group-hover:scale-110">🗺️</span>
          <span class="text-sm font-bold">Map</span>
        </a>
      </ng-container>

      <ng-container *ngIf="isAdmin">
        <a routerLink="/admin/accounts" routerLinkActive="bg-blue-600 shadow-lg shadow-blue-900/50"
           class="group flex items-center rounded-xl p-3 transition-all hover:bg-slate-700">
          <span class="mr-3 text-lg transition-transform group-hover:scale-110">🏢</span>
          <span class="text-sm font-bold">Workspace</span>
        </a>

        <a routerLink="/admin/users" routerLinkActive="bg-blue-600 shadow-lg shadow-blue-900/50"
           class="group flex items-center rounded-xl p-3 transition-all hover:bg-slate-700">
          <span class="mr-3 text-lg transition-transform group-hover:scale-110">🌍</span>
          <span class="text-sm font-bold">User</span>
        </a>
      </ng-container>

    </nav>
  </aside>

  <main class="relative flex min-w-0 flex-1 flex-col overflow-hidden bg-slate-50">
    <div class="relative flex-1">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<div class="flex h-screen bg-gray-100 overflow-hidden font-sans">
  <aside class="w-64 bg-[#1e293b] text-white flex flex-col h-full shadow-2xl shrink-0">
    <div class="p-6 text-center border-b border-slate-700 h-20 flex items-center justify-center">
      <span class="text-xl font-black tracking-widest text-blue-400 uppercase italic">Traffic Signs</span>
    </div>

    <nav class="flex-1 pt-6 px-4 space-y-2 overflow-y-auto">

      <ng-container *ngIf="isAdmin || !isAdmin">
        <a routerLink="/map" routerLinkActive="bg-blue-600 shadow-lg"
           class="flex items-center p-3 rounded-xl hover:bg-slate-700 transition-all group">
          <span class="mr-3 text-lg group-hover:scale-110 transition-transform">🗺️</span>
          <span class="font-bold text-sm">Map</span>
        </a>
      </ng-container>

      <ng-container *ngIf="isAdmin">
        <a routerLink="/admin/accounts" routerLinkActive="bg-blue-600 shadow-lg shadow-blue-900/50"
           class="flex items-center p-3 rounded-xl hover:bg-slate-700 transition-all group">
          <span class="mr-3 text-lg group-hover:scale-110 transition-transform">🏢</span>
          <span class="font-bold text-sm">Workspace</span>
        </a>

        <a routerLink="/admin/users" routerLinkActive="bg-blue-600 shadow-lg shadow-blue-900/50"
           class="flex items-center p-3 rounded-xl hover:bg-slate-700 transition-all group">
          <span class="mr-3 text-lg group-hover:scale-110 transition-transform">🌍</span>
          <span class="font-bold text-sm">User</span>
        </a>
      </ng-container>

    </nav>

    <div class="p-4 border-t border-slate-700">
      <button (click)="onLogout()"
              class="w-full flex items-center justify-center p-4 text-red-400 hover:bg-red-500/10 rounded-xl transition-all font-black text-[12px] tracking-[0.2em] uppercase">
        Log Out
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 overflow-hidden bg-slate-50 relative">
    <div class="flex-1 relative">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
